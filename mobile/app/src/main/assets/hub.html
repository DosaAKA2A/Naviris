<meta charset="UTF-8" />

<title>Naviris</title>
<style>
  :root { --bg:#0a0a0c; --text:#ececef; --muted:#8b8d94; --line:#232327; }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { background:radial-gradient(120% 70% at 50% -10%, #141417 0%, #0a0a0d 60%); color:var(--text);
    font-family:-apple-system, "Segoe UI", Roboto, system-ui, sans-serif; min-height:100vh;
    display:flex; flex-direction:column; align-items:center; padding:12vh 20px 40px; }
  .logo { width:56px; height:56px; margin-bottom:18px; }
  .clock { font-size:54px; font-weight:200; letter-spacing:1px; }
  .greet { color:var(--muted); font-size:13px; margin:6px 0 28px; }
  form { width:100%; max-width:420px; display:flex; align-items:center; gap:10px;
    height:50px; padding:0 18px; border-radius:999px; background:rgba(14,14,17,.85);
    border:1px solid #26262b; margin-bottom:34px; }
  form svg { width:18px; height:18px; color:var(--muted); flex-shrink:0; }
  input { flex:1; height:100%; border:none; outline:none; background:transparent; color:var(--text); font-size:16px; }
  input::placeholder { color:#5c5e64; }
  .tiles { width:100%; max-width:420px; display:grid; grid-template-columns:repeat(4,1fr); gap:16px; }
  a.tile { display:flex; flex-direction:column; align-items:center; gap:8px; text-decoration:none; }
  .sq { width:100%; aspect-ratio:1; border-radius:20px; background:linear-gradient(140deg,#1e1e23,#141418);
    border:1px solid rgba(255,255,255,.06); display:flex; align-items:center; justify-content:center; }
  .sq svg { width:44%; height:44%; color:#e4e6ea; }
  .name { font-size:11px; color:var(--muted); max-width:100%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
</style>
</head>
