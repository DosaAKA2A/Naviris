name: Mobile APK

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Preparar firma (si hay secretos configurados)
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
          KS_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          if [ -n "$KS_B64" ]; then
            mkdir -p "$HOME/.android-keys"
            # tr elimina saltos y espacios por si el valor se pegó con la línea partida
            echo "$KS_B64" | tr -d ' \t\r\n' | base64 -d > "$HOME/.android-keys/cobalt-release.jks"
            {
              echo "storeFile=$HOME/.android-keys/cobalt-release.jks"
              echo "storePassword=$KS_PASS"
              echo "keyAlias=cobalt"
              echo "keyPassword=$KS_PASS"
            } > "$HOME/.android-keys/cobalt-release.properties"
            echo "Firma release configurada."
          else
            echo "Sin secretos de firma: el APK saldrá sin firmar."
          fi

      - name: Compilar APK
        working-directory: mobile
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleRelease --no-daemon --console=plain

      - name: Renombrar APK con la versión
        id: apk
        run: |
          VER=$(grep -oP 'versionName "\K[^"]+' mobile/app/build.gradle)
          APK=$(ls mobile/app/build/outputs/apk/release/app-release*.apk | head -1)
          cp "$APK" "Naviris-$VER.apk"
          echo "name=Naviris-$VER.apk" >> "$GITHUB_OUTPUT"

      - name: Adjuntar APK a la release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" "${{ steps.apk.outputs.name }}" --clobber

      - name: Guardar APK como artefacto (ejecución manual)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk.outputs.name }}
          path: ${{ steps.apk.outputs.name }}
