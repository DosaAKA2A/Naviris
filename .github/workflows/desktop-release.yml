name: Desktop Release

# Se dispara al empujar una etiqueta vX.Y.Z: compila el instalador de Windows
# y publica la release en GitHub con el token del propio workflow.
# Al publicarse la release, el workflow "Mobile APK" adjunta el APK automáticamente.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Descargar yt-dlp y ffmpeg
        run: npm run fetch-bin

      - name: Compilar y publicar release
        run: npm run release
        env:
          GH_TOKEN: ${{ github.token }}
