name: Desktop Release

# Se dispara al empujar una etiqueta vX.Y.Z: compila el instalador de Windows
# y publica la release en GitHub con el token del propio workflow.
# Al publicarse la release, el workflow "Mobile APK" adjunta el APK automáticamente.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Descargar yt-dlp y ffmpeg
        run: npm run fetch-bin

      - name: Compilar y publicar release
        run: npm run release
        env:
          GH_TOKEN: ${{ github.token }}

  # La release creada arriba con el token del workflow NO dispara otros workflows
  # (protección de GitHub), así que el APK se adjunta aquí como segundo job.
  apk:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Preparar firma (si hay secretos configurados)
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
          KS_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          if [ -n "$KS_B64" ]; then
            mkdir -p "$HOME/.android-keys"
            echo "$KS_B64" | tr -d ' \t\r\n' | base64 -d > "$HOME/.android-keys/cobalt-release.jks"
            {
              echo "storeFile=$HOME/.android-keys/cobalt-release.jks"
              echo "storePassword=$KS_PASS"
              echo "keyAlias=cobalt"
              echo "keyPassword=$KS_PASS"
            } > "$HOME/.android-keys/cobalt-release.properties"
          fi

      - name: Compilar APK
        working-directory: mobile
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleRelease --no-daemon --console=plain

      - name: Adjuntar APK a la release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VER=$(grep -oP 'versionName "\K[^"]+' mobile/app/build.gradle)
          APK=$(ls mobile/app/build/outputs/apk/release/app-release*.apk | head -1)
          cp "$APK" "Naviris-$VER.apk"
          gh release upload "${{ github.ref_name }}" "Naviris-$VER.apk" --clobber
